name: GMGN Bot

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
      
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.10'
      
      - run: pip install -r requirements.txt
      
      - run: python bot.py
